<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Contacto - Topografía Hernández</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Be Vietnam Pro', 'Segoe UI', Arial, sans-serif; background: #FAFAFA; color: #374151; }
        nav { background: #121212; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
        nav .logo { color: white; font-size: 1.1rem; font-weight: bold; padding: 1rem 0; }
        nav .links { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        nav a { color: #9CA3AF; text-decoration: none; padding: 1rem 0.75rem; }
        nav a:hover { color: #F6B72B; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .user-name { color: #F6B72B; font-size: 0.9rem; }
        .logout-btn { background: none; border: none; color: #9CA3AF; cursor: pointer; font-family: inherit; font-size: 1rem; padding: 1rem 0.75rem; }
        .logout-btn:hover { color: #F6B72B; }
        .admin-badge { background: #F6B72B; color: #121212; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: bold; margin-left: 0.5rem; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background-color: #121212; min-width: 160px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; right: 0; }
        .dropdown-content a { color: #9CA3AF; padding: 12px 16px; text-decoration: none; display: block; text-align: left; }
        .dropdown-content a:hover { color: #F6B72B; }
        .dropdown:hover .dropdown-content { display: block; }
        main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .section-title { color: #121212; font-size: 1.5rem; margin-bottom: 1.5rem; border-left: 4px solid #F6B72B; padding-left: 0.75rem; }
        .card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 4px 10px rgba(0,0,0,.08); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, textarea { width: 100%; padding: 0.75rem; border: 1px solid #D1D5DB; border-radius: 6px; font-family: inherit; }
        button { background: #F6B72B; color: #121212; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #e0a800; }
        footer { background: #121212; color: #9CA3AF; text-align: center; padding: 2rem; margin-top: 3rem; font-size: 0.85rem; }
        @media (max-width: 768px) {
            nav { flex-direction: column; }
            .links { justify-content: center; margin-bottom: 0.5rem; }
        }
    </style>
</head>
<body>

<nav>
    <span class="logo">📐 TOPOGRAFÍA HERNÁNDEZ</span>
    <div class="links">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/nosotros}">Nosotros</a>
        <a th:href="@{/servicios}">Servicios</a>
        <a th:href="@{/proyectos}">Proyectos</a>
        <a th:href="@{/noticias}">Noticias</a>
        <a th:href="@{/blog}">Blog</a>
        <a th:href="@{/contacto}">Contacto</a>
        
        <!-- CARRITO - visible para todos los usuarios autenticados -->
        <a th:href="@{/carrito}" sec:authorize="isAuthenticated()">🛒 Carrito</a>
        
        <!-- Enlace solo para ADMIN -->
        <a th:href="@{/admin/usuarios}" sec:authorize="hasRole('ADMIN')" style="background:#F6B72B; color:#121212; border-radius:4px;">👥 Admin</a>
        
        <!-- Usuario no autenticado: muestra botón de login -->
        <div sec:authorize="isAnonymous()">
            <a th:href="@{/login}">🔐 Iniciar Sesión</a>
        </div>
        
        <!-- Usuario autenticado: muestra menú desplegable -->
        <div sec:authorize="isAuthenticated()" class="user-info">
            <div class="dropdown">
                <span class="user-name">
                    👤 <span sec:authentication="name"></span>
                    <span sec:authorize="hasRole('ADMIN')" class="admin-badge">Admin</span>
                </span>
                <div class="dropdown-content">
                    <a th:href="@{/perfil}">Mi Perfil</a>
                    <a th:href="@{/cambiar-password}">Cambiar Contraseña</a>
                    <form th:action="@{/logout}" method="post" style="margin:0">
                        <button type="submit" class="logout-btn" style="width:100%; text-align:left">🚪 Cerrar Sesión</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</nav>

<main>
    <h2 class="section-title">Contacto</h2>
    <div class="card">
        <form th:action="@{/contacto/enviar}" method="post">
            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" name="nombre" required/>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" required/>
            </div>
            <div class="form-group">
                <label>Teléfono:</label>
                <input type="tel" name="telefono"/>
            </div>
            <div class="form-group">
                <label>Mensaje:</label>
                <textarea name="mensaje" rows="5" required></textarea>
            </div>
            <button type="submit">Enviar mensaje</button>
        </form>
    </div>
</main>

<footer>
    <p>© 2026 Topografía Hernández - Precisión y confianza en cada medición</p>
    <p style="margin-top: 0.5rem;">📞 (506) 1234-5678 | ✉️ info@topografiahernandez.com</p>
</footer>

</body>
</html>
