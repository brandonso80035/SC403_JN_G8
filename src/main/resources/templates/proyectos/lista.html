<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Proyectos - Topografía Hernández</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Be Vietnam Pro', 'Segoe UI', Arial, sans-serif; 
            background: #FAFAFA; 
            color: #374151; 
        }
        
        main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        
        .section-title {
            color: #121212;
            font-size: 2rem;
            margin-bottom: 2rem;
            border-left: 4px solid #F6B72B;
            padding-left: 0.75rem;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            border-left: 6px solid #F6B72B;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card h3 {
            color: #121212;
            margin-bottom: 0.75rem;
            font-size: 1.4rem;
        }
        
        .card p {
            color: #4B5563;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }
        
        .ubicacion {
            color: #F6B72B;
            font-size: 0.85rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }
        
        .fecha {
            color: #9CA3AF;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }
        
        @media (max-width: 768px) {
            .section-title { font-size: 1.5rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main>
    <h2 class="section-title">🏗️ Proyectos Realizados</h2>
    <div class="grid">
        <div class="card" th:each="p : ${proyectos}">
            <h3 th:text="${p.titulo}">Título del proyecto</h3>
            <p th:text="${p.descripcion}">Descripción del proyecto</p>
            <p class="ubicacion">📍 <span th:text="${p.ubicacion}">Ubicación</span></p>
            <p class="fecha" th:text="${p.fecha}">Fecha</p>
        </div>
    </div>
    <p th:if="${proyectos == null or proyectos.empty}" style="text-align:center; padding:2rem; color:#9CA3AF;">No hay proyectos registrados actualmente.</p>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
