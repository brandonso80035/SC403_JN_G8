<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Iniciar Sesión - Topografía Hernández</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: linear-gradient(135deg, #121212 0%, #2d2d2d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .login-container h2 { color: #121212; margin-bottom: 1.5rem; text-align: center; border-left: 4px solid #F6B72B; padding-left: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 1rem; }
        input:focus { outline: none; border-color: #F6B72B; }
        button { width: 100%; padding: 0.75rem; background: #F6B72B; color: #121212; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .alert { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .alert-info { background: #E0F2FE; color: #075985; border: 1px solid #BAE6FD; }
        .links { text-align: center; margin-top: 1rem; }
        .links a { color: #F6B72B; text-decoration: none; }
        .logo { text-align: center; font-size: 2rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">👷️</div>
    <h2>Iniciar Sesión</h2>
    
    <div th:if="${param.error}" class="alert alert-danger">
        Usuario o contraseña incorrectos
    </div>
    
    <div th:if="${param.logout}" class="alert alert-info">
        Has cerrado sesión exitosamente
    </div>
    
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Usuario:</label>
            <input type="text" id="username" name="username" required autofocus/>
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required/>
        </div>
        <button type="submit">Ingresar</button>
    </form>
    
    <div class="links">
        <p>¿No tienes cuenta? <a th:href="@{/registro/nuevo}">Regístrate aquí</a></p>
        <p><a th:href="@{/registro/recordar}">¿Olvidaste tu contraseña?</a></p>
    </div>
</div>
</body>
</html>
