<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Restablecer Contraseña - Topografía Hernández</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background: linear-gradient(135deg, #121212 0%, #2d2d2d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-container { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .reset-container h2 { color: #121212; margin-bottom: 1.5rem; text-align: center; border-left: 4px solid #F6B72B; padding-left: 1rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #374151; font-weight: 500; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #D1D5DB; border-radius: 6px; font-size: 1rem; }
        input:focus { outline: none; border-color: #F6B72B; }
        button { width: 100%; padding: 0.75rem; background: #F6B72B; color: #121212; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        .alert { padding: 0.75rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .alert-success { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
    </style>
</head>
<body>
<div class="reset-container">
    <h2>Restablecer Contraseña</h2>
    
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    
    <form th:action="@{/registro/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}"/>
        
        <div class="form-group">
            <label>Nueva Contraseña:</label>
            <input type="password" name="password" required/>
        </div>
        
        <div class="form-group">
            <label>Confirmar Nueva Contraseña:</label>
            <input type="password" name="confirmarPassword" required/>
        </div>
        
        <button type="submit">Actualizar Contraseña</button>
    </form>
</div>
</body>
</html>
